<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Countryball Marble Race - Random Levels</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #333;
            border: 4px solid #555;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        #leaderboard {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>Countryball Sacīkšu Eliminācija</h1>
    <canvas id="raceCanvas" width="500" height="600"></canvas>
    
    <div id="ui">
        <button onclick="startRace()">Palaist bumbiņas</button>
        <div id="leaderboard">Gatavs startam!</div>
    </div>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
const leaderboard = document.getElementById('leaderboard');

const gravity = 0.15;
const bounce = 0.5;

let countries = [
    { name: "Latvija", color: "#9e3039", text: "🇱🇻" },
    { name: "Lietuva", color: "#fdb913", text: "🇱🇹" },
    { name: "Igaunija", color: "#4891d9", text: "🇪🇪" },
    { name: "Somija", color: "#ffffff", text: "🇫🇮" },
    { name: "Vācija", color: "#ffce00", text: "🇩🇪" }
];

let marbles = [];
let finishedMarbles = [];
let obstacles = [];
let raceRunning = false;
let currentLevelName = "";

// 1. LĪMENIS: Klasiskais Plinko (Tapas)
function generateClassicLevel() {
    currentLevelName = "Klasiskās tapas";
    for (let row = 0; row < 5; row++) {
        let cols = row % 2 === 0 ? 6 : 5;
        let xOffset = row % 2 === 0 ? 40 : 75;
        for (let col = 0; col < cols; col++) {
            obstacles.push({ x: xOffset + col * 80, y: 150 + row * 70, radius: 8 });
        }
    }
}

// 2. LĪMENIS: Zig-Zag lielie šķēršļi
function generateZigZagLevel() {
    currentLevelName = "Zig-Zag labirints";
    obstacles.push({ x: 100, y: 160, radius: 45 });
    obstacles.push({ x: 400, y: 250, radius: 45 });
    obstacles.push({ x: 120, y: 350, radius: 45 });
    obstacles.push({ x: 380, y: 450, radius: 45 });
    
    // Sīki punkti papildu haosam vidū
    obstacles.push({ x: 250, y: 200, radius: 8 });
    obstacles.push({ x: 250, y: 400, radius: 8 });
}

// 3. LĪMENIS: Centrālais dimants / Sadalītājs
function generateDiamondLevel() {
    currentLevelName = "Centrālais dimants";
    obstacles.push({ x: 250, y: 160, radius: 30 });
    obstacles.push({ x: 140, y: 260, radius: 25 });
    obstacles.push({ x: 360, y: 260, radius: 25 });
    obstacles.push({ x: 250, y: 360, radius: 35 });
    
    // Malu atsitēji
    obstacles.push({ x: 30, y: 310, radius: 15 });
    obstacles.push({ x: 470, y: 310, radius: 15 });
}

// Izvēlas nejaušu karti
function createRandomMap() {
    obstacles = []; 
    const randomChoice = Math.floor(Math.random() * 3);
    
    if (randomChoice === 0) {
        generateClassicLevel();
    } else if (randomChoice === 1) {
        generateZigZagLevel();
    } else {
        generateDiamondLevel();
    }
}

function setupMarbles() {
    marbles = countries.map((country, index) => ({
        ...country,
        x: 180 + (index * 30) + (Math.random() - 0.5) * 15,
        y: 50,
        vx: (Math.random() - 0.5) * 3,
        vy: 0,
        radius: 16,
        isFinished: false
    }));
    finishedMarbles = [];
}

function startRace() {
    if (raceRunning) return;
    if (countries.length <= 1) {
        leaderboard.innerHTML = `Spēle beigusies! Uzvarētājs ir 👑 <b>${countries[0].name}</b>!`;
        return;
    }
    createRandomMap(); 
    setupMarbles();
    raceRunning = true;
    leaderboard.innerHTML = `Pašreizējā trase: <b>${currentLevelName}</b><br>Sacīkstes norit...`;
    update();
}

function update() {
    if (!raceRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Fona teksts ar līmeņa nosaukumu
    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
    ctx.font = "bold 26px Arial";
    ctx.fillText(currentLevelName.toUpperCase(), 30, 90);

    // Finiša līnija
    ctx.fillStyle = "#555";
    ctx.fillRect(0, canvas.height - 80, canvas.width, 10);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Arial";
    ctx.fillText("FINIŠA ZONA", canvas.width / 2 - 40, canvas.height - 55);

    // Zīmē šķēršļus
    ctx.fillStyle = "#888";
    obstacles.forEach(obs => {
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.closePath();
    });

    // Kustība un fizika
    marbles.forEach(m => {
        if (m.isFinished) return;

        m.vy += gravity;
        m.x += m.vx;
        m.y += m.vy;

        if (m.x - m.radius < 0) { m.x = m.radius; m.vx *= -bounce; }
        if (m.x + m.radius > canvas.width) { m.x = canvas.width - m.radius; m.vx *= -bounce; }

        obstacles.forEach(obs => {
            let dx = m.x - obs.x;
            let dy = m.y - obs.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < m.radius + obs.radius) {
                let angle = Math.atan2(dy, dx);
                m.x = obs.x + (m.radius + obs.radius) * Math.cos(angle);
                m.y = obs.y + (m.radius + obs.radius) * Math.sin(angle);
                
                let speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy) * bounce;
                m.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 2;
                m.vy = Math.sin(angle) * speed;
            }
        });

        if (m.y >= canvas.height - 80) {
            m.isFinished = true;
            finishedMarbles.push(m);
        }

        // Vizuālais bumbiņas zīmējums
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
        ctx.fillStyle = m.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#000";
        ctx.stroke();
        ctx.closePath();

        ctx.fillStyle = "white";
        ctx.font = "16px Arial";
        ctx.fillText(m.text, m.x - 10, m.y + 6);
    });

    if (finishedMarbles.length === countries.length) {
        raceRunning = false;
        handleElimination();
        return;
    }

    requestAnimationFrame(update);
}

function handleElimination() {
    let loser = finishedMarbles[finishedMarbles.length - 1];
    countries = countries.filter(c => c.name !== loser.name);

    if (countries.length > 1) {
        leaderboard.innerHTML = `❌ <b>${loser.name}</b> palika pēdējā trasē "<i>${currentLevelName}</i>" un tiek eliminēta!<br>Palikušas ${countries.length} valstis. Gatavojies nākamajai trasei!`;
    } else {
        leaderboard.innerHTML = `🎉 Spēle beigusies! Trasē "<i>${currentLevelName}</i>" izkrita ${loser.name}.<br>👑 <b>UZVARĒTĀJS IR ${countries[0].name}!</b>`;
    }
}
</script>

</body>
</html>
