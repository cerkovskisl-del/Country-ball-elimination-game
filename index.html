<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasaules Eliminācijas Turnīrs — Pro Mobile</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --accent-green: #00e676;
            --accent-orange: #ff9100;
            --accent-blue: #00b0ff;
            --text-main: #f5f5f7;
        }

        body {
            background: linear-gradient(135deg, #0f0f12 0%, #1a1a24 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00b0ff, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* Responsīvs trīs kolonnu izkārtojums, kas pielāgots horizontālam ekrānam */
        .game-layout {
            display: flex;
            max-width: 100%;
            margin: 0 auto;
            gap: 10px;
            align-items: stretch;
            height: calc(100vh - 50px);
        }

        /* Kreisais panelis iestatījumiem */
        .left-panel {
            flex: 1;
            min-width: 200px;
            max-width: 240px;
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 12px;
        }

        /* Centrs ar Canvas spēles laukumu */
        .center-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Labais panelis izslēgšanas vēsturei */
        .right-panel {
            flex: 1;
            min-width: 220px;
            max-width: 260px;
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 3px;
            text-align: left;
        }

        #predictionArea {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }

        select {
            padding: 8px;
            font-size: 13px;
            font-weight: 700;
            background: #26262b;
            color: white;
            border: 1px solid #3e3e46;
            border-radius: 6px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        #eventDisplay {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(90deg, rgba(255,145,0,0.15) 0%, rgba(255,145,0,0.02) 100%);
            border-left: 3px solid var(--accent-orange);
            padding: 8px;
            border-radius: 4px;
            text-align: left;
        }

        /* Canvas automātiski mērogojas pēc ekrāna augstuma un platuma */
        canvas {
            background: #1e1e24;
            border: 1px solid #2d2d35;
            border-radius: 10px;
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        button {
            padding: 10px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #05190e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        #roundStatusLog {
            font-size: 12px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 6px;
            color: #ccc;
            text-align: left;
            overflow-y: auto;
        }

        #eliminationHistory {
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 6px;
            color: #aaa;
            text-align: left;
            overflow-y: auto;
            flex-grow: 1;
        }

        .round-block {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px;
            border-radius: 6px;
            border-left: 3px solid #ff5252;
        }

        .round-block-title {
            font-weight: bold;
            color: #fff;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .elim-index {
            color: #ff9100;
            font-weight: bold;
            margin-right: 5px;
        }

        .highlight-lose { color: #ff5252; font-weight: 500; }
        .highlight-win { color: var(--accent-green); font-weight: bold; }
        .highlight-map { color: #888; font-size: 10px; }

        /* OBLIGĀTĀ HORIZONTĀLĀ REŽĪMA BRĪDINĀJUMS (OVERLAY) */
        #turnDeviceOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0f0f12;
            z-index: 9999;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Ja ekrāns ir vertikāls (Portrait), parādām rotācijas brīdinājumu un paslēpjam spēli */
        @media screen and (orientation: portrait) {
            #turnDeviceOverlay {
                display: flex;
            }
            .game-layout, h1 {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div id="turnDeviceOverlay">

    <p style="color: #888; font-size: 14px; max-width: 280px; margin: 5px auto 0 auto;">Lai redzētu sacensības un rezultātu tabulu pilnvērtīgi, ir nepieciešams horizontālais režīms.</p>

let marbles = []; let finishedMarbles = []; let obstacles = []; let raceRunning = false; let flagImages = {};

function updatePredictSelect() {
    let currentChosen = countryPredictSelect.value;
    countryPredictSelect.innerHTML = '<option value="">Izvēlies valsti...</option>';
    let sorted = [...countries].sort((a,b) => a.name.localeCompare(b.name));
    sorted.forEach(c => {
        let opt = document.createElement('option'); opt.value = c.code; opt.innerText = c.name;
        if(c.code === currentChosen) opt.selected = true;
        countryPredictSelect.appendChild(opt);
    });
}

function preloadFlags(callback) {
    let loaded = 0; let total = countries.length;
    countries.forEach(c => {
        let img = new Image(); img.src = `https://flagcdn.com/w80/${c.code}.png`;
        img.onload = () => { loaded++; if (loaded === total) callback(); };
        img.onerror = () => { loaded++; if (loaded === total) callback(); };
        flagImages[c.code] = img;
    });
}

preloadFlags(() => {
    roundStatusLog.innerHTML = `Sistēma pilnībā gatava raundam.`;
    updatePredictSelect();
    rollNextEvent();
});

function drawCountryball(ctx, x, y, radius, code) {
    ctx.save(); ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.clip();
    let img = flagImages[code];
    if (img && img.complete) ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2);
    else { ctx.fillStyle = "#444"; ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2); }
    ctx.restore();
    
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.lineWidth = 1.2; ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 3, y - 2, 2.2, 0, Math.PI * 2); ctx.arc(x + 3, y - 2, 2.2, 0, Math.PI * 2); ctx.fill();
}

function createExplosion(x, y) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 2, alpha: 1
        });
    }
}

function createRandomMap() {
    obstacles = [];
    const mapID = Math.floor(Math.random() * 10);

    if (mapID === 0) {
        currentLevelName = "1. Pīlāru Haoss";
        for (let i = 0; i < 6; i++) {
            for (let j = 0; j < 6; j++) obstacles.push({ x: 130 + i * 110, y: 220 + j * 65, radius: 10 });
        }
    } else if (mapID === 1) {
        currentLevelName = "2. Dubultais Piltuves Slazds";
        obstacles.push({ x: 250, y: 250, radius: 90 }, { x: 550, y: 250, radius: 90 }, { x: 400, y: 440, radius: 70 });
        for (let i = 0; i < 6; i++) obstacles.push({ x: 100 + i * 120, y: 590, radius: 8 });
    } else if (mapID === 2) {
        currentLevelName = "3. Dimantu Kaskāde";
        let rows = [4, 5, 4, 3];
        rows.forEach((count, rIdx) => {
            let startX = 400 - ((count - 1) * 50);
            for (let c = 0; c < count; c++) obstacles.push({ x: startX + c * 100, y: 230 + rIdx * 90, radius: 14 });
        });
    } else if (mapID === 3) {
        currentLevelName = "4. Mega Zig-Zag Labirints";
        obstacles.push({ x: 180, y: 240, radius: 85 }, { x: 620, y: 380, radius: 85 }, { x: 180, y: 520, radius: 85 });
        for (let i = 0; i < 4; i++) obstacles.push({ x: 400, y: 280 + i * 90, radius: 9 });
    } else if (mapID === 4) {
        currentLevelName = "5. Plinko Siena";
        for (let r = 0; r < 7; r++) {
            let cols = r % 2 === 0 ? 9 : 8; let xOff = r % 2 === 0 ? 60 : 105;
            for (let c = 0; c < cols; c++) obstacles.push({ x: xOff + c * 85, y: 220 + r * 55, radius: 6 });
        }
    } else if (mapID === 5) {
        currentLevelName = "6. Krusta Šķērsļi";
        for (let i = 0; i < 7; i++) {
            obstacles.push({ x: 140 + i * 85, y: 350, radius: 12 }, { x: 400, y: 200 + i * 55, radius: 12 });
        }
    } else if (mapID === 6) {
        currentLevelName = "7. Šaurie Gaiteņi";
        for (let i = 1; i < 5; i++) {
            obstacles.push({ x: i * 160, y: 250, radius: 35 }, { x: i * 160 - 80, y: 450, radius: 35 });
        }
    } else if (mapID === 7) {
        currentLevelName = "8. Centrālais Gredzens";
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
            obstacles.push({ x: 400 + Math.cos(a) * 140, y: 380 + Math.sin(a) * 140, radius: 11 });
        }
        obstacles.push({ x: 400, y: 380, radius: 25 });
    } else if (mapID === 8) {
        currentLevelName = "9. Viļņveida Sienas";
        for (let x = 50; x < 800; x += 90) {
            let waveY = 350 + Math.sin(x * 0.02) * 120;
            obstacles.push({ x: x, y: waveY, radius: 16 }, { x: x, y: waveY - 130, radius: 9 });
        }
    } else {
        currentLevelName = "10. Sadursmes Lielie Bloki";
        obstacles.push({ x: 150, y: 300, radius: 60 }, { x: 400, y: 220, radius: 50 }, { x: 650, y: 300, radius: 60 });
    }
}

function rollNextEvent() {
    if (countries.length <= 1) return;
    let dice = Math.random();
    if (countries.length > 50 && dice < 0.35) {
        currentEvent = "top30";
        eventDisplay.innerHTML = "🏆 REŽĪMS: Tikai <b>TOP 30</b> finišē! Pārējie uzsprāgst uzreiz!";
    } else if (countries.length > 25 && dice >= 0.35 && dice < 0.65) {
        currentEvent = "half";
        eventDisplay.innerHTML = "🪓 REŽĪMS: Pusītes slazds! Tiklīdz <b>50%</b> finišē, pārējie uzsprāgst!";
    } else if (countries.length > 5 && dice >= 0.65 && dice < 0.85) {
        currentEvent = "triple";
        eventDisplay.innerHTML = "❌ REŽĪMS: Trīskāršais apdraudējums. Pēdējās 3 bumbas pamet spēli.";
    } else {
        currentEvent = "normal";
        eventDisplay.innerHTML = "🛡️ REŽĪMS: Standarta izslēgšana. Tikai pati pēdējā valsts izkrīt.";
    }
}

function startRace() {
    if (raceRunning) return;
    if (countries.length <= 1) {
        roundStatusLog.innerHTML = `Čempionāts ir pabeigts!`;
        return;
    }
    
    roundCounter++;
    currentPrediction = countryPredictSelect.value;
    createRandomMap();
    particles = [];
    
    marbles = countries.map((country, index) => ({
        ...country,
        x: 60 + ((index % 22) * 32) + (Math.random() - 0.5) * 4,
        y: 35 + Math.floor(index / 22) * 26,
        vx: (Math.random() - 0.5) * 1.5, vy: 0, radius: 11, isFinished: false, stuckFrames: 0, exploded: false
    }));
    
    finishedMarbles = [];
    raceRunning = true;
    update();
}

function update() {
    if (!raceRunning && particles.length === 0) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255, 255, 255, 0.02)";
    ctx.font = "bold 36px sans-serif";
    ctx.fillText(currentLevelName.toUpperCase(), 30, 150);

    ctx.fillStyle = "#2d2d38"; ctx.fillRect(0, canvas.height - 80, canvas.width, 10);
    ctx.fillStyle = "rgba(0, 230, 118, 0.03)"; ctx.fillRect(0, canvas.height - 70, canvas.width, 70);

    obstacles.forEach(obs => {
        ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#3e3e4a"; ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
    });

    let targetFinishCount = countries.length; 
    if (currentEvent === "top30" && countries.length > 30) targetFinishCount = 30;
    if (currentEvent === "half") targetFinishCount = Math.floor(countries.length / 2);

    marbles.forEach(m => {
        if (m.isFinished || m.exploded) return;
        
        m.vy += gravity; m.x += m.vx; m.y += m.vy;

        if (Math.abs(m.vx) < 0.1 && Math.abs(m.vy) < 0.2) {
            m.stuckFrames++;
            if (m.stuckFrames > 20) { m.vx = (Math.random() - 0.5) * 5; m.vy = -1; m.stuckFrames = 0; }
        } else { m.stuckFrames = 0; }

        if (m.x - m.radius < 0) { m.x = m.radius; m.vx = Math.abs(m.vx) * bounce + 0.1; }
        if (m.x + m.radius > canvas.width) { m.x = canvas.width - m.radius; m.vx = -Math.abs(m.vx) * bounce - 0.1; }

        obstacles.forEach(obs => {
            let dx = m.x - obs.x; let dy = m.y - obs.y; let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < m.radius + obs.radius) {
                let angle = Math.atan2(dy, dx);
                m.x = obs.x + (m.radius + obs.radius) * Math.cos(angle);
                m.y = obs.y + (m.radius + obs.radius) * Math.sin(angle);
                let speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy) * bounce;
                if (speed < 0.5) speed = 0.8;
                m.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 1.2; 
                m.vy = Math.sin(angle) * speed;
            }
        });

        if (m.y >= canvas.height - 80) { 
            m.isFinished = true; 
            finishedMarbles.push(m); 
        }
        
        drawCountryball(ctx, m.x, m.y, m.radius, m.code);
    });

    if (raceRunning && finishedMarbles.length >= targetFinishCount) {
        raceRunning = false;
        marbles.forEach(m => {
            if (!m.isFinished) {
                m.exploded = true;
                createExplosion(m.x, m.y);
            }
        });
        handleElimination();
    }

    if (raceRunning && finishedMarbles.length === countries.length) {
        raceRunning = false;
        handleElimination();
    }

    particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
        if (p.alpha <= 0) { particles.splice(index, 1); return; }
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = "#ff3d00";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    });

    requestAnimationFrame(update);
}

function writeEliminationBlock(roundNum, mapName, orderedLosers) {
    let entriesHTML = orderedLosers.map((c, index) => {
        return `<div class="log-entry">
                    <span><span class="elim-index">#${index + 1}</span><span class="highlight-lose">${c.name}</span></span>
                </div>`;
    }).join('');

    let block = `<div class="round-block">
                    <div class="round-block-title">Raunds ${roundNum} <span class="highlight-map">(${mapName})</span></div>
                    ${entriesHTML}
                 </div>`;
                 
    roundBlocksHTML.unshift(block); 
    eliminationHistory.innerHTML = roundBlocksHTML.join('');
}

function handleElimination() {
    let eliminatedCountries = [];
    let reasonText = "";

    if (currentEvent === "top30" && finishedMarbles.length >= 30) {
        let survivors = finishedMarbles.slice(0, 30);
        let losers = marbles.filter(m => !survivors.some(s => s.code === m.code));
        losers.sort((a, b) => a.y - b.y); 
        
        eliminatedCountries = losers.map(l => ({ code: l.code, name: l.name }));
        countries = countries.filter(c => survivors.some(s => s.code === c.code));
        reasonText = `Finišs slēgts! TOP 30 tika tālāk.`;
    } 
    else if (currentEvent === "half") {
        let halfSize = Math.floor(countries.length / 2);
        let survivors = finishedMarbles.slice(0, halfSize);
        let losers = marbles.filter(m => !survivors.some(s => s.code === m.code));
        losers.sort((a, b) => a.y - b.y);

        eliminatedCountries = losers.map(l => ({ code: l.code, name: l.name }));
        countries = countries.filter(c => survivors.some(s => s.code === c.code));
        reasonText = `Grieziena beigas! Lēnākā puse uzsprāga.`;
    } 
    else if (currentEvent === "triple" && finishedMarbles.length >= 3) {
        let losers = finishedMarbles.slice(-3).reverse();
        eliminatedCountries = losers.map(l => ({ code: l.code, name: l.name }));
        let elimCodes = eliminatedCountries.map(e => e.code);
        countries = countries.filter(c => !elimCodes.includes(c.code));
        reasonText = `Trīs pēdējās vietas pamet turnīru.`;
    } 
    else {
        let loser = finishedMarbles[finishedMarbles.length - 1];
        eliminatedCountries.push({ code: loser.code, name: loser.name });
        countries = countries.filter(c => c.code !== loser.code);
        reasonText = `Pēdējā bumba tika eliminēta.`;
    }

    writeEliminationBlock(roundCounter, currentLevelName, eliminatedCountries);

    let predictionText = "";
    if (currentPrediction) {
        let isEliminated = eliminatedCountries.some(e => e.code === currentPrediction);
        if (isEliminated) {
            predictionText = "<br><span class=\"highlight-lose\">🛑 Tava izvēlētā valsts nupat izkrita!</span>";
        } else if (finishedMarbles[0] && finishedMarbles[0].code === currentPrediction) {
            predictionText = "<br><span class=\"highlight-win\">⭐ Izcili! Tava valsts uzvarēja raundu!</span>";
        } else {
            predictionText = "<br><span class=\"highlight-win\">🔹 Tava valsts kvalificējās.</span>";
        }
    }

    if (countries.length > 1) {
        roundStatusLog.innerHTML = `${reasonText}${predictionText}<br><br><b>Palikušas valstis: ${countries.length}</b>`;
        updatePredictSelect();
        rollNextEvent();
    } else {
        let finalWinner = countries[0];
        eventDisplay.innerText = "TURNĪRS BEIDZIES!";
        if (currentPrediction === finalWinner.code) {
            roundStatusLog.innerHTML = `👑 <b>ČEMPIONS: ${finalWinner.name}!</b><br>Tava prognoze bija uzvarošā! 🏆`;
        } else {
            roundStatusLog.innerHTML = `👑 <b>ČEMPIONS: ${finalWinner.name}!</b>`;
        }
    }
}
</script>
