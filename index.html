<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Pasaules eliminācijas turnīrs - Visas valstis</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #333;
            border: 4px solid #555;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background-color: #45a049; }
        .shake-btn { background-color: #ff9800; }
        .shake-btn:hover { background-color: #e68a00; }
        #leaderboard {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.5;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <h1>Pasaules Eliminācijas Turnīrs (195 Valstis)</h1>
    <canvas id="raceCanvas" width="800" height="750"></canvas>
    
    <div id="ui">
        <button onclick="startRace()">Sākt raundu</button>
        <button class="shake-btn" onclick="shakeMarbles()">Pakratīt bumbas (Antistuck)</button>
        <div id="leaderboard">Ielādē visas pasaules valstis...</div>
    </div>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
const leaderboard = document.getElementById('leaderboard');

const gravity = 0.14;
const bounce = 0.45;

// PILNĪGI VISAS 195 PASAULES VALSTIS (pēc ISO standarta)
let countries = [
    { code: "af", name: "Afganistāna" }, { code: "al", name: "Albānija" }, { code: "dz", name: "Alžīrija" }, { code: "ad", name: "Andora" }, { code: "ao", name: "Angola" },
    { code: "ag", name: "Antigva un Barbuda" }, { code: "ar", name: "Argentīna" }, { code: "am", name: "Armēnija" }, { code: "au", name: "Austrālija" }, { code: "at", name: "Austrija" },
    { code: "az", name: "Azerbaidžāna" }, { code: "bs", name: "Bahamu Salas" }, { code: "bh", name: "Bahreina" }, { code: "bd", name: "Bangladeša" }, { code: "bb", name: "Barbadosa" },
    { code: "by", name: "Baltkrievija" }, { code: "be", name: "Beļģija" }, { code: "bz", name: "Beliza" }, { code: "bj", name: "Benina" }, { code: "bt", name: "Butāna" },
    { code: "bo", name: "Bolīvija" }, { code: "ba", name: "Bosnija un Hercegovina" }, { code: "bw", name: "Botsvāna" }, { code: "br", name: "Brazīlija" }, { code: "bn", name: "Bruneja" },
    { code: "bg", name: "Bulgārija" }, { code: "bf", name: "Burkinafaso" }, { code: "bi", name: "Burundi" }, { code: "kh", name: "Kambodža" }, { code: "cm", name: "Kamerūna" },
    { code: "ca", name: "Kanāda" }, { code: "cv", name: "Kaboverde" }, { code: "cf", name: "Centrālāfrikas Republika" }, { code: "td", name: "Čada" }, { code: "cl", name: "Čīle" },
    { code: "cn", name: "Ķīna" }, { code: "co", name: "Kolumbija" }, { code: "km", name: "Komoras" }, { code: "cg", name: "Kongo (Brazavila)" }, { code: "cd", name: "Kongo (Kinšasa)" },
    { code: "cr", name: "Kostarika" }, { code: "ci", name: "Kotdivuāra" }, { code: "hr", name: "Horvātija" }, { code: "cu", name: "Kuba" }, { code: "cy", name: "Kipra" },
    { code: "cz", name: "Čehija" }, { code: "dk", name: "Dānija" }, { code: "dj", name: "Džibuti" }, { code: "dm", name: "Dominika" }, { code: "do", name: "Dominikāna" },
    { code: "ec", name: "Ekvadora" }, { code: "eg", name: "Ēģipte" }, { code: "sv", name: "Elsalvadora" }, { code: "gq", name: "Ekvatoriālā Gvineja" }, { code: "er", name: "Eritreja" },
    { code: "ee", name: "Igaunija" }, { code: "sz", name: "Esvatīni" }, { code: "et", name: "Etiopija" }, { code: "fj", name: "Fidži" }, { code: "fi", name: "Somija" },
    { code: "fr", name: "Francija" }, { code: "ga", name: "Gabona" }, { code: "gm", name: "Gambija" }, { code: "ge", name: "Gruzija" }, { code: "de", name: "Vācija" },
    { code: "gh", name: "Gana" }, { code: "gr", name: "Grieķija" }, { code: "gd", name: "Grenāda" }, { code: "gt", name: "Gvatemala" }, { code: "gn", name: "Gvineja" },
    { code: "gw", name: "Gvineja-Bisava" }, { code: "gy", name: "Gajāna" }, { code: "ht", name: "Haiti" }, { code: "hn", name: "Hondurasa" }, { code: "hu", name: "Ungārija" },
    { code: "is", name: "Islande" }, { code: "in", name: "Indija" }, { code: "id", name: "Indonēzija" }, { code: "ir", name: "Irāna" }, { code: "iq", name: "Irāka" },
    { code: "ie", name: "Īrija" }, { code: "il", name: "Izraēla" }, { code: "it", name: "Itālija" }, { code: "jm", name: "Jamaika" }, { code: "jp", name: "Japāna" },
    { code: "jo", name: "Jordānija" }, { code: "kz", name: "Kazahstāna" }, { code: "ke", name: "Kenija" }, { code: "ki", name: "Kiribati" }, { code: "kp", name: "Ziemeļkoreja" },
    { code: "kr", name: "Dienvidkoreja" }, { code: "kw", name: "Kuveita" }, { code: "kg", name: "Kirgizstāna" }, { code: "la", name: "Laosa" }, { code: "lv", name: "Latvija" },
    { code: "lb", name: "Libāna" }, { code: "ls", name: "Lesoto" }, { code: "lr", name: "Libērija" }, { code: "ly", name: "Lībija" }, { code: "li", name: "Lihtenšteina" },
    { code: "lt", name: "Lietuva" }, { code: "lu", name: "Luksemburga" }, { code: "mg", name: "Madagaskara" }, { code: "mw", name: "Malāvija" }, { code: "my", name: "Malaizija" },
    { code: "mv", name: "Maldivu Salas" }, { code: "ml", name: "Mali" }, { code: "mt", name: "Malta" }, { code: "mh", name: "Maršala Salas" }, { code: "mr", name: "Mauritānija" },
    { code: "mu", name: "Maurīcija" }, { code: "mx", name: "Meksika" }, { code: "fm", name: "Mikronēzija" }, { code: "md", name: "Moldova" }, { code: "mc", name: "Monako" },
    { code: "mn", name: "Mongolija" }, { code: "me", name: "Melnkalne" }, { code: "ma", name: "Maroka" }, { code: "mz", name: "Mocambika" }, { code: "mm", name: "Mjanma" },
    { code: "na", name: "Namībija" }, { code: "nr", name: "Nauru" }, { code: "np", name: "Nepāla" }, { code: "nl", name: "Nīderlande" }, { code: "nz", name: "Jaunzēlande" },
    { code: "ni", name: "Nikaragva" }, { code: "ne", name: "Nīgera" }, { code: "ng", name: "Nigērija" }, { code: "mk", name: "Ziemeļmaķedonija" }, { code: "no", name: "Norvēģija" },
    { code: "om", name: "Omāna" }, { code: "pk", name: "Pakistāna" }, { code: "pw", name: "Palau" }, { code: "pa", name: "Panama" }, { code: "pg", name: "Papua-Jaungvineja" },
    { code: "py", name: "Paragvaja" }, { code: "pe", name: "Peru" }, { code: "ph", name: "Filipīnas" }, { code: "pl", name: "Polija" }, { code: "pt", name: "Portugāle" },
    { code: "qa", name: "Katara" }, { code: "ro", name: "Rumānija" }, { code: "ru", name: "Krievija" }, { code: "rw", name: "Ruanda" }, { code: "kn", name: "Sentkitsa un Nevisa" },
    { code: "lc", name: "Sentlūsija" }, { code: "vc", name: "Sentvinsenta" }, { code: "ws", name: "Samoa" }, { code: "sm", name: "Sanmarīno" }, { code: "st", name: "Santome un Prinsipi" },
    { code: "sa", name: "Saūda Arābija" }, { code: "sn", name: "Senegāla" }, { code: "rs", name: "Serbija" }, { code: "sc", name: "Seišelu Salas" }, { code: "sl", name: "Sjerraleone" },
    { code: "sg", name: "Singapūra" }, { code: "sk", name: "Slovākija" }, { code: "si", name: "Slovēnija" }, { code: "sb", name: "Sālamana Salas" }, { code: "so", name: "Somālija" },
    { code: "za", name: "Dienvidāfrika" }, { code: "ss", name: "Dienvidsudāna" }, { code: "es", name: "Spānija" }, { code: "lk", name: "Šrilanka" }, { code: "sd", name: "Sudāna" },
    { code: "sr", name: "Surinama" }, { code: "se", name: "Zviedrija" }, { code: "ch", name: "Šveice" }, { code: "sy", name: "Sīrija" }, { code: "tw", name: "Taivāna" },
    { code: "tj", name: "Tadžikistāna" }, { code: "tz", name: "Tanzānija" }, { code: "th", name: "Taizeme" }, { code: "tl", name: "Timora" }, { code: "tg", name: "Togo" },
    { code: "to", name: "Tonga" }, { code: "tt", name: "Trinidadas un Tobāgo" }, { code: "tn", name: "Tunisija" }, { code: "tr", name: "Turcija" }, { code: "tm", name: "Turkmenistāna" },
    { code: "tv", name: "Tuvalu" }, { code: "ug", name: "Uganda" }, { code: "ua", name: "Ukraina" }, { code: "ae", name: "AAE" }, { code: "gb", name: "Apvienotā Karaliste" },
    { code: "us", name: "ASV" }, { code: "uy", name: "Urugvaja" }, { code: "uz", name: "Uzbekistāna" }, { code: "vu", name: "Vanuatu" }, { code: "va", name: "Vatikāns" },
    { code: "ve", name: "Venesuela" }, { code: "vn", name: "Vjetnama" }, { code: "ye", name: "Jemena" }, { code: "zm", name: "Zambija" }, { code: "zw", name: "Zimbabve" }
];

let marbles = [];
let finishedMarbles = [];
let obstacles = [];
let raceRunning = false;
let currentLevelName = "";
let flagImages = {};

function preloadFlags(callback) {
    let loaded = 0;
    let total = countries.length;
    leaderboard.innerHTML = "Notiek 195 valstu karogu ielāde no tīmekļa...";
    
    countries.forEach(c => {
        let img = new Image();
        img.src = `https://flagcdn.com/w80/${c.code}.png`;
        img.onload = () => {
            flagImages[c.code] = img;
            loaded++;
            if (loaded === total) callback();
        };
        img.onerror = () => {
            flagImages[c.code] = new Image();
            loaded++;
            if (loaded === total) callback();
        };
    });
}

preloadFlags(() => {
    leaderboard.innerHTML = `Visi karogi veiksmīgi ielādēti!<br>Gatavas startam ir visas <b>${countries.length}</b> pasaules valstis. Spied pogu!`;
});

function drawCountryball(ctx, x, y, radius, code) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.clip();

    let img = flagImages[code];
    if (img && img.complete) {
        ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2);
    } else {
        ctx.fillStyle = "#666";
        ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
    }

    ctx.restore();

    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.lineWidth = 1.8; ctx.strokeStyle = "#000"; ctx.stroke();
    
    // Nedaudz mazākas acis, jo pašas bumbas tagad ir mazākas
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 3, y - 2, 2.5, 0, Math.PI * 2); ctx.arc(x + 3, y - 2, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 0.8; ctx.strokeStyle = "#000"; ctx.stroke();
}

// Trases dizaini (Optimizēti lielam daudzumam un 800px platumam)
function generateClassicLevel() {
    currentLevelName = "Globālais tapu labirints";
    for (let row = 0; row < 7; row++) {
        let cols = row % 2 === 0 ? 8 : 7;
        let xOffset = row % 2 === 0 ? 90 : 140;
        for (let col = 0; col < cols; col++) {
            obstacles.push({ x: xOffset + col * 90, y: 220 + row * 65, radius: 8 });
        }
    }
}

function generateZigZagLevel() {
    currentLevelName = "Pasaules Zig-Zag Trase";
    obstacles.push({ x: 150, y: 220, radius: 75 });
    obstacles.push({ x: 650, y: 340, radius: 75 });
    obstacles.push({ x: 150, y: 460, radius: 75 });
    obstacles.push({ x: 650, y: 580, radius: 75 });
    for (let i = 0; i < 5; i++) obstacles.push({ x: 400, y: 240 + i * 90, radius: 8 });
}

function generateDiamondLevel() {
    currentLevelName = "Kontinentālie Dimanti";
    obstacles.push({ x: 400, y: 220, radius: 50 });
    obstacles.push({ x: 220, y: 370, radius: 40 });
    obstacles.push({ x: 580, y: 370, radius: 40 });
    obstacles.push({ x: 400, y: 520, radius: 50 });
    obstacles.push({ x: 50, y: 420, radius: 20 });
    obstacles.push({ x: 750, y: 420, radius: 20 });
}

function createRandomMap() {
    obstacles = []; 
    const randomChoice = Math.floor(Math.random() * 3);
    if (randomChoice === 0) generateClassicLevel();
    else if (randomChoice === 1) generateZigZagLevel();
    else generateDiamondLevel();
}

function setupMarbles() {
    marbles = countries.map((country, index) => ({
        ...country,
        // 195 bumbiņas tiek sakārtotas blīvās rindās pa 22 bumbām katrā
        x: 60 + ((index % 22) * 32) + (Math.random() - 0.5) * 6,
        y: 30 + Math.floor(index / 22) * 26,
        vx: (Math.random() - 0.5) * 2.5,
        vy: 0,
        radius: 11, // Optimāls izmērs, lai satilptu visi 195
        isFinished: false,
        stuckFrames: 0
    }));
    finishedMarbles = [];
}

function shakeMarbles() {
    if (!raceRunning) return;
    marbles.forEach(m => {
        if (!m.isFinished) {
            m.vx += (Math.random() - 0.5) * 6;
            m.vy -= Math.random() * 4 + 2;
        }
    });
}

function startRace() {
    if (raceRunning) return;
    if (countries.length <= 1) {
        leaderboard.innerHTML = `Turnīrs noslēdzies! Pasaules valdnieks ir 👑 <b>${countries[0].name}</b>!`;
        return;
    }
    createRandomMap(); 
    setupMarbles();
    raceRunning = true;
    leaderboard.innerHTML = `Trase: <b>${currentLevelName}</b><br>Kopā startē ${countries.length} valstis. Bumbiņas ripo...`;
    update();
}

function update() {
    if (!raceRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
    ctx.font = "bold 32px Arial";
    ctx.fillText(currentLevelName.toUpperCase(), 40, 160);

    ctx.fillStyle = "#555";
    ctx.fillRect(0, canvas.height - 80, canvas.width, 10);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Arial";
    ctx.fillText("FINIŠA ZONA", canvas.width / 2 - 45, canvas.height - 50);

    ctx.fillStyle = "#888";
    obstacles.forEach(obs => {
        ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2); ctx.fill(); ctx.closePath();
    });

    marbles.forEach(m => {
        if (m.isFinished) return;

        m.vy += gravity; m.x += m.vx; m.y += m.vy;

        // Antistuck
        if (Math.abs(m.vx) < 0.1 && Math.abs(m.vy) < 0.2) {
            m.stuckFrames++;
            if (m.stuckFrames > 35) {
                m.vx = (Math.random() - 0.5) * 5;
                m.vy = -2;
                m.stuckFrames = 0;
            }
        } else {
            m.stuckFrames = 0;
        }

        if (m.x - m.radius < 0) { m.x = m.radius; m.vx *= -bounce; }
        if (m.x + m.radius > canvas.width) { m.x = canvas.width - m.radius; m.vx *= -bounce; }

        obstacles.forEach(obs => {
            let dx = m.x - obs.x;
            let dy = m.y - obs.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < m.radius + obs.radius) {
                let angle = Math.atan2(dy, dx);
                m.x = obs.x + (m.radius + obs.radius) * Math.cos(angle);
                m.y = obs.y + (m.radius + obs.radius) * Math.sin(angle);
                
                let speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy) * bounce;
                m.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 2;
                m.vy = Math.sin(angle) * speed;
            }
        });

        if (m.y >= canvas.height - 80) {
            m.isFinished = true;
            finishedMarbles.push(m);
        }

        drawCountryball(ctx, m.x, m.y, m.radius, m.code);
    });

    if (finishedMarbles.length === countries.length) {
        raceRunning = false;
        handleElimination();
        return;
    }

    requestAnimationFrame(update);
}

function handleElimination() {
    let loser = finishedMarbles[finishedMarbles.length - 1];
    countries = countries.filter(c => c.code !== loser.code);

    if (countries.length > 1) {
        leaderboard.innerHTML = `❌ <b>${loser.name}</b> finišēja pēdējā un izkrīt no pasaules kausa!<br>Palikušas ${countries.length} valstis. Spied pogu nākamajai kārtai!`;
    } else {
        leaderboard.innerHTML = `🎉 PASAULES TURNĪRS IR NOSLĒDZIES!<br>👑 <b>PASAULES VALDNIEKS IR ${countries[0].name}!</b>`;
    }
}
</script>

</body>
</html>
