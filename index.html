<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Pasaules Countryball Marble Race</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #333;
            border: 4px solid #555;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background-color: #45a049; }
        .shake-btn { background-color: #ff9800; }
        .shake-btn:hover { background-color: #e68a00; }
        #leaderboard {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.5;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <h1>Pasaules Countryball Eliminācija</h1>
    <canvas id="raceCanvas" width="700" height="700"></canvas>
    
    <div id="ui">
        <button onclick="startRace()">Sākt nākamo raundu</button>
        <button class="shake-btn" onclick="shakeMarbles()">Pakratīt bumbas (Antistuck)</button>
        <div id="leaderboard">Ielādē valstis...</div>
    </div>

<script>
const canvas = document.getElementById('raceCanvas');
const ctx = canvas.getContext('2d');
const leaderboard = document.getElementById('leaderboard');

const gravity = 0.15;
const bounce = 0.45;

// MILZĪGS VALSTU SARAKSTS (Vari droši papildināt pēc šī paša šablona līdz pat visām 195)
let countries = [
    // Eiropa
    { code: "lv", name: "Latvija" }, { code: "lt", name: "Lietuva" }, { code: "ee", name: "Igaunija" },
    { code: "fi", name: "Somija" }, { code: "de", name: "Vācija" }, { code: "fr", name: "Francija" },
    { code: "it", name: "Itālija" }, { code: "es", name: "Spānija" }, { code: "ua", name: "Ukraina" },
    { code: "pl", name: "Polija" }, { code: "gb", name: "Apvienotā Karaliste" }, { code: "se", name: "Zviedrija" },
    { code: "no", name: "Norvēģija" }, { code: "dk", name: "Dānija" }, { code: "nl", name: "Nīderlande" },
    { code: "be", name: "Beļģija" }, { code: "ch", name: "Šveice" }, { code: "at", name: "Austrija" },
    { code: "ie", name: "Īrija" }, { code: "pt", name: "Portugāle" }, { code: "gr", name: "Grieķija" },
    { code: "cz", name: "Čehija" }, { code: "hu", name: "Ungārija" }, { code: "ro", name: "Rumānija" },
    { code: "hr", name: "Horvātija" }, { code: "is", name: "Islande" },
    // Amerika
    { code: "us", name: "ASV" }, { code: "ca", name: "Kanāda" }, { code: "mx", name: "Meksika" },
    { code: "br", name: "Brazīlija" }, { code: "ar", name: "Argentīna" }, { code: "co", name: "Kolumbija" },
    { code: "cl", name: "Čīle" }, { code: "pe", name: "Peru" }, { code: "ve", name: "Venesuela" },
    // Āzija & Okeānija
    { code: "cn", name: "Ķīna" }, { code: "jp", name: "Japāna" }, { code: "in", name: "Indija" },
    { code: "kr", name: "Dienvidkoreja" }, { code: "au", name: "Austrālija" }, { code: "nz", name: "Jaunzēlande" },
    { code: "id", name: "Indonēzija" }, { code: "th", name: "Taizeme" }, { code: "pk", name: "Pakistāna" },
    { code: "sa", name: "Saūda Arābija" }, { code: "tr", name: "Turcija" }, { code: "il", name: "Izraēla" },
    { code: "sg", name: "Singapūra" }, { code: "ph", name: "Filipīnas" }, { code: "vn", name: "Vjetnama" },
    // Āfrika
    { code: "za", name: "Dienvidāfrika" }, { code: "eg", name: "Ēģipte" }, { code: "ng", name: "Nigērija" },
    { code: "ma", name: "Maroka" }, { code: "ke", name: "Kenija" }, { code: "gh", name: "Gana" },
    { code: "dz", name: "Alžīrija" }, { code: "tn", name: "Tunisija" }, { code: "et", name: "Etiopija" }
];

let marbles = [];
let finishedMarbles = [];
let obstacles = [];
let raceRunning = false;
let currentLevelName = "";
let flagImages = {}; // Šeit saglabāsim ielādētos attēlus

// Karogu attēlu priekš-ielāde no interneta datubāzes
function preloadFlags(callback) {
    let loaded = 0;
    let total = countries.length;
    
    countries.forEach(c => {
        let img = new Image();
        // Izmantojam publisku FlagCDN servisu
        img.src = `https://flagcdn.com/w80/${c.code}.png`;
        img.onload = () => {
            flagImages[c.code] = img;
            loaded++;
            if (loaded === total) callback();
        };
        img.onerror = () => {
            // Ja kāds karogs neielādējas, izveidojam tukšu bildi, lai spēle neuzkartos
            flagImages[c.code] = new Image();
            loaded++;
            if (loaded === total) callback();
        };
    });
}

// Izsauc karogu ielādi uzreiz, kad atver lapu
preloadFlags(() => {
    leaderboard.innerHTML = `Visi karogi ielādēti! Kopā trasē gatavas doties <b>${countries.length}</b> pasaules valstis.`;
});

function drawCountryball(ctx, x, y, radius, code) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.clip();

    // Uzzīmē ielādēto karoga attēlu bumbiņas iekšā
    let img = flagImages[code];
    if (img && img.complete) {
        // Centrējam un mērogojam bildi bumbiņas rādiusā
        ctx.drawImage(img, x - radius, y - radius, radius * 2, radius * 2);
    } else {
        ctx.fillStyle = "#777";
        ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
    }

    ctx.restore();

    // Bumbiņas kontūra
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.lineWidth = 2.5; ctx.strokeStyle = "#000"; ctx.stroke();
    
    // Countryball acis
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x - 5, y - 3, 4, 0, Math.PI * 2); ctx.arc(x + 5, y - 3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = "#000"; ctx.stroke();
}

// Trases dizaini (Optimizēti lielākam Canvas izmēram 700x700)
function generateClassicLevel() {
    currentLevelName = "Pasaules tapu labirints";
    for (let row = 0; row < 7; row++) {
        let cols = row % 2 === 0 ? 7 : 6;
        let xOffset = row % 2 === 0 ? 80 : 130;
        for (let col = 0; col < cols; col++) {
            obstacles.push({ x: xOffset + col * 90, y: 180 + row * 65, radius: 8 });
        }
    }
}

function generateZigZagLevel() {
    currentLevelName = "Mega Zig-Zag";
    obstacles.push({ x: 130, y: 180, radius: 65 });
    obstacles.push({ x: 570, y: 290, radius: 65 });
    obstacles.push({ x: 150, y: 420, radius: 65 });
    obstacles.push({ x: 550, y: 530, radius: 65 });
    for (let i = 0; i < 5; i++) obstacles.push({ x: 350, y: 200 + i * 90, radius: 8 });
}

function generateDiamondLevel() {
    currentLevelName = "Pasaules Dimanti";
    obstacles.push({ x: 350, y: 180, radius: 45 });
    obstacles.push({ x: 200, y: 320, radius: 35 });
    obstacles.push({ x: 500, y: 320, radius: 35 });
    obstacles.push({ x: 350, y: 460, radius: 45 });
    obstacles.push({ x: 50, y: 370, radius: 20 });
    obstacles.push({ x: 650, y: 370, radius: 20 });
}

function createRandomMap() {
    obstacles = []; 
    const randomChoice = Math.floor(Math.random() * 3);
    if (randomChoice === 0) generateClassicLevel();
    else if (randomChoice === 1) generateZigZagLevel();
    else generateDiamondLevel();
}

function setupMarbles() {
    marbles = countries.map((country, index) => ({
        ...country,
        // Tā kā bumbu ir daudz, tās izvietojas vairākās rindās pa 12 bumbām rindā
        x: 100 + ((index % 12) * 45) + (Math.random() - 0.5) * 10,
        y: 35 + Math.floor(index / 12) * 38,
        vx: (Math.random() - 0.5) * 3,
        vy: 0,
        radius: 15, // Nedaudz mazākas, lai satilptu visas pasaules valstis
        isFinished: false,
        stuckFrames: 0
    }));
    finishedMarbles = [];
}

function shakeMarbles() {
    if (!raceRunning) return;
    marbles.forEach(m => {
        if (!m.isFinished) {
            m.vx += (Math.random() - 0.5) * 6;
            m.vy -= Math.random() * 4 + 2;
        }
    });
}

function startRace() {
    if (raceRunning) return;
    if (countries.length <= 1) {
        leaderboard.innerHTML = `Turnīrs noslēdzies! Pasaules valdnieks ir 👑 <b>${countries[0].name}</b>!`;
        return;
    }
    createRandomMap(); 
    setupMarbles();
    raceRunning = true;
    leaderboard.innerHTML = `Trase: <b>${currentLevelName}</b><br>Bumbiņas ripo...`;
    update();
}

function update() {
    if (!raceRunning) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Fona teksts
    ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
    ctx.font = "bold 32px Arial";
    ctx.fillText(currentLevelName.toUpperCase(), 40, 130);

    // Finiša līnija
    ctx.fillStyle = "#555";
    ctx.fillRect(0, canvas.height - 80, canvas.width, 10);
    ctx.fillStyle = "#fff";
    ctx.font = "14px Arial";
    ctx.fillText("FINIŠA ZONA", canvas.width / 2 - 45, canvas.height - 50);

    // Zīmē šķēršļus
    ctx.fillStyle = "#888";
    obstacles.forEach(obs => {
        ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2); ctx.fill(); ctx.closePath();
    });

    marbles.forEach(m => {
        if (m.isFinished) return;

        m.vy += gravity; m.x += m.vx; m.y += m.vy;

        // Antistuck sistēma
        if (Math.abs(m.vx) < 0.1 && Math.abs(m.vy) < 0.2) {
            m.stuckFrames++;
            if (m.stuckFrames > 40) {
                m.vx = (Math.random() - 0.5) * 5;
                m.vy = -2.5;
                m.stuckFrames = 0;
            }
        } else {
            m.stuckFrames = 0;
        }

        // Malu sadursmes
        if (m.x - m.radius < 0) { m.x = m.radius; m.vx *= -bounce; }
        if (m.x + m.radius > canvas.width) { m.x = canvas.width - m.radius; m.vx *= -bounce; }

        // Šķēršļu sadursmes
        obstacles.forEach(obs => {
            let dx = m.x - obs.x;
            let dy = m.y - obs.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < m.radius + obs.radius) {
                let angle = Math.atan2(dy, dx);
                m.x = obs.x + (m.radius + obs.radius) * Math.cos(angle);
                m.y = obs.y + (m.radius + obs.radius) * Math.sin(angle);
                
                let speed = Math.sqrt(m.vx * m.vx + m.vy * m.vy) * bounce;
                m.vx = Math.cos(angle) * speed + (Math.random() - 0.5) * 2;
                m.vy = Math.sin(angle) * speed;
            }
        });

        if (m.y >= canvas.height - 80) {
            m.isFinished = true;
            finishedMarbles.push(m);
        }

        // Zīmēšana ar bildi
        drawCountryball(ctx, m.x, m.y, m.radius, m.code);
    });

    if (finishedMarbles.length === countries.length) {
        raceRunning = false;
        handleElimination();
        return;
    }

    requestAnimationFrame(update);
}

function handleElimination() {
    let loser = finishedMarbles[finishedMarbles.length - 1];
    countries = countries.filter(c => c.code !== loser.code);

    if (countries.length > 1) {
        leaderboard.innerHTML = `❌ <b>${loser.name}</b> finišēja pēdējā un izkrīt!<br>Palikušas ${countries.length} pasaules valstis. Spied pogu nākamajam raundam!`;
    } else {
        leaderboard.innerHTML = `🎉 PASAULES TURNĪRS IR NOSLĒDZIES!<br>👑 <b>UZVARĒTĀJS IR ${countries[0].name}!</b>`;
    }
}
</script>

</body>
</html>
